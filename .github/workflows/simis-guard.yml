name: SIMIS Execution Guard

on:
  pull_request:
  push:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Prisma Instantiation Guard
        run: |
          ILLEGAL=$(grep -r "new PrismaClient" . \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=coverage \
            | grep -v "packages/database/src/index.ts" || true)
          if [ -n "$ILLEGAL" ]; then
            echo "❌ Direct PrismaClient usage detected outside of database package"
            echo "$ILLEGAL"
            exit 1
          fi

      - name: Database Layer Enforcement
        run: |
          if grep -r "@prisma/client" packages/* | grep -v "packages/database" | grep -v "node_modules" | grep -v "/dist/"; then
            echo "❌ Unauthorized Prisma import detected"
            exit 1
          fi

      - name: API Contract Drift Check
        run: |
          diff apps/api/src/routers/mvp.ts apps/api/src/routers/v2.ts || true

      - name: Contract Runtime Validation
        run: pnpm --filter @simis/contracts test

      - name: Build Check (turbo — builds deps before apps)
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsYWNlaG9sZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MjAwMDAwMDAwMH0.fake-signature-for-ci"
          NEXT_PUBLIC_KERNEL_API_URL: "https://placeholder.vercel.app"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/simis_ci"
        run: npx turbo run build --filter=@simis/api --filter=@simis/web

      - name: Runtime Smoke Test
        env:
          SUPABASE_URL: "http://localhost"
          SUPABASE_ANON_KEY: "fake"
          DATABASE_URL: "postgresql://localhost/fake"
          UPSTASH_REDIS_REST_URL: "http://localhost"
          UPSTASH_REDIS_REST_TOKEN: "fake"
          OPENAI_API_KEY: "fake"
          REDIS_URL: "redis://localhost:6379"
          PORT: "4000"
        run: |
          node apps/api/dist/index.js &
          sleep 5
          curl http://localhost:4000/health || exit 1
