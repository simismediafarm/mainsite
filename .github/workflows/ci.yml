name: SIMIS monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-verify:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9.1.0

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build all packages (turbo — respects dep chain)
      env:
        NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsYWNlaG9sZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MjAwMDAwMDAwMH0.fake-signature-for-ci"
        NEXT_PUBLIC_KERNEL_API_URL: "https://placeholder.vercel.app"
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/simis_ci"
      run: npx turbo run build --filter=@simis/api --filter=@simis/web

    - name: Lint
      run: pnpm lint

    - name: Run unit tests
      run: pnpm --filter='@simis/kernel-graph' --filter='@simis/contracts' test

    - name: PoE shadow verification
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        echo "Running PoE shadow replay verification..."
        pnpm --filter='@simis/kernel-graph' exec tsx src/v7.1/runtime/replay.ts --mode=shadow --dry-run || echo "PoE shadow verify: no replay script configured yet (non-blocking)"

    - name: Validate migration numbering
      run: |
        echo "Checking for duplicate migration prefixes..."
        DUPES=$(ls packages/database/migrations/*.sql | sed 's/.*\///' | sed 's/_.*//' | sort | uniq -d)
        if [ -n "$DUPES" ]; then
          echo "::error::Duplicate migration prefix(es) found: $DUPES — deployment blocked."
          exit 1
        fi
        echo "Migration numbering: OK"
