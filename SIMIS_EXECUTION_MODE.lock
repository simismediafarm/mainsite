{
  "system": "SIMIS_V2_MIGRATION_ENGINE",
  "version": "1.0.0",
  "mode": "SAFE_REINTRODUCTION_PATH",
  "principle": "V2 must prove stability under controlled exposure before becoming primary",

  "phases": [
    {
      "id": "PHASE_0",
      "name": "STABLE_CORE",
      "state": "current",
      "description": "System operates purely on V1 stable runtime",
      "rules": {
        "v2_traffic": 0,
        "v2_visibility": "disabled",
        "validation": "none_in_runtime"
      }
    },
    {
      "id": "PHASE_1",
      "name": "SHADOW_MODE",
      "state": "active",
      "description": "V2 runs in background without affecting user response",
      "rules": {
        "v2_traffic": 0,
        "execution_mode": "shadow_only",
        "response_source": "v1_only",
        "v2_execution": "async_mirror"
      },
      "metrics": [
        "latency_v2",
        "error_rate_v2",
        "schema_diff_v1_v2"
      ]
    },
    {
      "id": "PHASE_2",
      "name": "OBSERVED_MODE",
      "state": "conditional",
      "description": "V2 executes alongside V1 with full telemetry capture",
      "rules": {
        "v2_traffic": 0,
        "execution_mode": "shadow_compare",
        "response_source": "v1_primary",
        "comparison": "enabled"
      },
      "constraints": {
        "v2_failure_affects_user": false
      }
    },
    {
      "id": "PHASE_3",
      "name": "CONTROLLED_DUAL_RUN",
      "state": "active",
      "description": "Small percentage of traffic routed to V2",
      "rules": {
        "v2_traffic": 0.1,
        "routing_mode": "probabilistic_split",
        "fallback": "instant_v1",
        "max_error_rate": 0.02
      }
    },
    {
      "id": "PHASE_4",
      "name": "GRADUAL_MIGRATION",
      "state": "adaptive",
      "description": "Traffic increases based on stability metrics",
      "rules": {
        "step_increment": 0.1,
        "evaluation_window_hours": 24,
        "rollback_trigger": {
          "error_rate_threshold": 0.03,
          "latency_regression_threshold": 0.3
        }
      }
    },
    {
      "id": "PHASE_5",
      "name": "V2_PRIMARY",
      "state": "target",
      "description": "V2 becomes default system",
      "rules": {
        "v2_traffic": 1.0,
        "v1_fallback": "emergency_only",
        "promotion_requirements": {
          "stability_days": 7,
          "zero_critical_errors": true,
          "latency_parity": true
        }
      }
    }
  ],

  "guardrails": {
    "circuit_breaker": {
      "enabled": true,
      "trigger_conditions": [
        "v2_error_rate_spike",
        "prisma_runtime_failure",
        "schema_mismatch_spike"
      ],
      "action": "fallback_to_v1"
    },

    "shadow_validator": {
      "enabled": true,
      "mode": "non_blocking",
      "behavior": "log_only"
    },

    "rollback_policy": {
      "immediate_triggers": [
        "500_error_spike",
        "db_connection_failure",
        "contract_breakage"
      ],
      "rollback_target": "last_safe_phase"
    }
  },

  "architecture_constraints": {
    "database": {
      "rule": "single_source_of_truth",
      "allowed_import": "@simis/database",
      "forbidden": "new PrismaClient outside database package"
    },
    "gateway": {
      "rule": "routing_only",
      "forbidden": [
        "adaptive scoring",
        "AI decisioning",
        "stateful migration logic"
      ]
    },
    "api": {
      "rule": "strict separation",
      "allowed_modes": ["v1", "v2"],
      "forbidden": "cross-contract transformation logic"
    }
  }
}
